<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nature Focus List</title>
    <style>
        @import url('https://googleapis.com');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Quicksand', sans-serif;
        }

        /* Earthy, morning-fog nature gradient background */
        body {
            background: linear-gradient(135deg, #1e2f23 0%, #2d4a36 50%, #405d47 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Organic Glass Container - Leaf Template */
        .todo-container {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            width: 100%;
            max-width: 440px;
            padding: 40px 35px;
            border-radius: 32px; /* Smooth, rounded organic corners */
            border: 1px solid rgba(255, 255, 255, 0.12);
            box-shadow: 0 30px 60px -15px rgba(15, 28, 20, 0.6);
        }

        h2 {
            color: #f1f7f3;
            font-size: 26px;
            margin-bottom: 6px;
            font-weight: 700;
            letter-spacing: -0.2px;
        }

        .subtitle {
            color: #a3b899;
            font-size: 13px;
            margin-bottom: 30px;
            display: block;
            font-weight: 500;
        }

        .input-section {
            position: relative;
            margin-bottom: 35px;
        }

        /* Sage Green Border Bottom */
        input[type="text"] {
            width: 100%;
            padding: 16px 4px;
            background: transparent;
            border: none;
            border-bottom: 2px solid rgba(163, 184, 153, 0.2);
            font-size: 16px;
            color: #f1f7f3;
            outline: none;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            font-weight: 500;
        }

        input[type="text"]::placeholder {
            color: #657e6b;
        }

        /* Gold/Sprout glowing focus effect */
        input[type="text"]:focus {
            border-bottom-color: #c2d8b9;
            box-shadow: 0 1px 0 0 #c2d8b9;
        }

        ul {
            list-style: none;
            max-height: 350px;
            overflow-y: auto;
            padding-right: 5px;
        }

        ul::-webkit-scrollbar {
            width: 4px;
        }
        ul::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.08);
            border-radius: 10px;
        }

        /* Elegant Organic List Item Cards */
        li {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.04);
            padding: 18px 22px;
            border-radius: 18px;
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            color: #e2ede5;
            font-size: 15px;
            font-weight: 500;
            cursor: pointer;
            user-select: none;
            transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
            animation: sproutIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            border-left: 3px solid transparent;
        }

        li:hover {
            background: rgba(255, 255, 255, 0.07);
            border-color: rgba(194, 216, 185, 0.3);
            color: #ffffff;
            transform: translateY(-2px) scale(1.01);
            border-left: 3px solid #c2d8b9;
        }

        /* State: Completed (Fades out gently like autumn leaves) */
        li.completed {
            background: rgba(15, 28, 20, 0.3);
            border-color: transparent;
            color: #556f5b;
            text-decoration: line-through;
            opacity: 0.4;
            transform: translateY(0) scale(1);
            border-left: 3px solid transparent;
        }

        /* Nature Micro-Animations */
        @keyframes sproutIn {
            from { opacity: 0; transform: translateY(15px) scale(0.97); filter: blur(2px); }
            to { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); }
        }

        @keyframes witherAway {
            to { opacity: 0; transform: scale(0.95) translateY(10px); filter: blur(6px); }
        }
    </style>
</head>
<body>

    <div class="todo-container">
        <h2>🌿 Nature Focus</h2>
        <span class="subtitle">Click once to complete. Double click to let go.</span>
        
        <div class="input-section">
            <input type="text" id="taskInput" placeholder="Grow a new task..." autocomplete="off">
        </div>

        <ul id="taskList"></ul>
    </div>

    <script>
        const taskInput = document.getElementById('taskInput');
        const taskList = document.getElementById('taskList');

        taskInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                addTask();
            }
        });

        function addTask() {
            const taskValue = taskInput.value.trim();
            
            if (taskValue === '') return;

            const li = document.createElement('li');
            li.innerText = taskValue;

            // Single click action: Complete task
            li.addEventListener('click', () => {
                li.classList.toggle('completed');
            });

            // Double click action: Delete task (wither animation)
            li.addEventListener('dblclick', () => {
                li.style.animation = 'witherAway 0.35s forwards';
                setTimeout(() => li.remove(), 350);
            });

            taskList.appendChild(li);
            taskInput.value = '';
        }
    </script>
</body>
</html>
