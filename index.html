
<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Productivity Dashboard</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:sans-serif;
}

body{
    background:#111827;
    color:white;
    transition:.3s;
}

.light{
    background:#f4f4f4;
    color:black;
}

.container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

h1{
    text-align:center;
    margin-bottom:20px;
}

.controls{
    display:grid;
    grid-template-columns:2fr 1fr 1fr 1fr auto;
    gap:10px;
}

input,select,button{
    padding:10px;
    border:none;
    border-radius:10px;
}

button{
    cursor:pointer;
}

.task{
    margin-top:15px;
    padding:15px;
    border-radius:15px;
    background:#1f2937;
    display:flex;
    justify-content:space-between;
    align-items:center;
}

.light .task{
    background:white;
}

.high{border-left:6px solid red;}
.medium{border-left:6px solid orange;}
.low{border-left:6px solid green;}

.completed{
    text-decoration:line-through;
    opacity:.6;
}

.progress{
    height:20px;
    background:#333;
    border-radius:20px;
    overflow:hidden;
    margin:20px 0;
}

.bar{
    height:100%;
    width:0%;
    background:lime;
}

.stats{
    display:flex;
    gap:20px;
    margin-bottom:20px;
}
</style>
</head>

<body>

<div class="container">

<h1>🚀 Productivity Dashboard</h1>

<div class="stats">
    <p>Total: <span id="total">0</span></p>
    <p>Completed: <span id="completed">0</span></p>
</div>

<div class="progress">
    <div class="bar" id="bar"></div>
</div>

<div class="controls">
    <input id="taskInput" placeholder="New Task">
    
    <select id="category">
        <option>School</option>
        <option>Personal</option>
        <option>Work</option>
    </select>

    <select id="priority">
        <option value="high">High</option>
        <option value="medium">Medium</option>
        <option value="low">Low</option>
    </select>

    <input type="date" id="date">

    <button onclick="addTask()">Add</button>
</div>

<br>

<input id="search"
placeholder="🔍 Search Tasks"
onkeyup="renderTasks()"
style="width:100%;">

<br><br>

<button onclick="toggleTheme()">🌙 Theme</button>

<div id="taskList"></div>

</div>

<script>

let tasks =
JSON.parse(localStorage.getItem("tasks")) || [];

function save(){
 localStorage.setItem(
 "tasks",
 JSON.stringify(tasks)
 );
}
function addTask() {
    const text = document.getElementById("taskInput").value;
    const category = document.getElementById("category").value;
    const priority = document.getElementById("priority").value;
    const date = document.getElementById("date").value;

    if (text.trim() === "") {
        alert("Please enter a task");
        return;
    }

    tasks.push({
        text: text,
        category: category,
        priority: priority,
        date: date,
        done: false
    });

    document.getElementById("taskInput").value = "";

    renderTasks();
}

function renderTasks(){

 let search =
 document.getElementById("search")
 .value.toLowerCase();

 let list =
 document.getElementById("taskList");

 list.innerHTML="";

 tasks.forEach((task,i)=>{

 if(!task.text.toLowerCase()
 .includes(search)) return;

 let div=document.createElement("div");

 div.className=
 task ${task.priority};

 div.innerHTML=`
 <div>
 <h3 class="${task.done?'completed':''}">
 ${task.text}
 </h3>
 <small>
 ${task.category} |
 ${task.date}
 </small>
 </div>

 <div>
 <button onclick="completeTask(${i})">
 ✔️
 </button>

 <button onclick="deleteTask(${i})">
 🗑️
 </button>
 </div>
 `;

 list.appendChild(div);
 });

 updateStats();
 save();
}

function completeTask(i){
 tasks[i].done=!tasks[i].done;
 renderTasks();
}

function deleteTask(i){
 tasks.splice(i,1);
 renderTasks();
}

function updateStats(){

 let total=tasks.length;

 let completed=
 tasks.filter(t=>t.done).length;

 document.getElementById(
 "total"
 ).innerText=total;

 document.getElementById(
 "completed"
 ).innerText=completed;

 let percent=
 total===0?0:
 (completed/total)*100;

 document.getElementById(
 "bar"
 ).style.width=
 percent+"%";
}

function toggleTheme(){
 document.body.classList.toggle("light");
}

renderTasks();

</script>

</body>
