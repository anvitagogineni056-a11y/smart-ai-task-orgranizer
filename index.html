<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sleek To-Do List</title>
    <style>
        /* Modern Reset and Google Font */
        @import url('https://googleapis.com');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        /* Fluid Gradient Background */
        body {
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        /* Glassmorphism Container Card */
        .todo-container {
            background: rgba(255, 255, 255, 0.9);
            width: 100%;
            max-width: 450px;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        h2 {
            color: #333;
            margin-bottom: 20px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Input Container Layout */
        .input-section {
            display: flex;
            margin-bottom: 25px;
        }

        input[type="text"] {
            flex: 1;
            padding: 14px 18px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
        }

        input[type="text"]:focus {
            border-color: #6c5ce7;
            box-shadow: 0 0 12px rgba(108, 92, 231, 0.2);
        }

        /* Smooth List Rendering */
        ul {
            list-style: none;
        }

        li {
            background: #f8f9fa;
            padding: 14px 15px;
            border-radius: 12px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
            border-left: 4px solid #6c5ce7;
            animation: fadeIn 0.4s ease;
        }

        li:hover {
            transform: translateX(4px);
            background: #f1f3f5;
        }

        /* Dynamic Interaction Classes */
        .task-text {
            cursor: pointer;
            flex: 1;
            color: #495057;
            font-size: 15px;
            transition: all 0.3s ease;
        }

        li.completed {
            border-left-color: #2ecc71;
            opacity: 0.6;
        }

        li.completed .task-text {
            text-decoration: line-through;
            color: #adb5bd;
        }

        /* Sleek Delete Button */
        .delete-btn {
            background: #ff7675;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .delete-btn:hover {
            background: #d63031;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="todo-container">
        <h2>📝 My Tasks</h2>
        
        <div class="input-section">
            <input type="text" id="taskInput" placeholder="Type task & press Enter...">
        </div>

        <ul id="taskList"></ul>
    </div>

    <script>
        const taskInput = document.getElementById('taskInput');
        const taskList = document.getElementById('taskList');

        // Capture Enter key press to submit task
        taskInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                addTask();
            }
        });

        function addTask() {
            const taskValue = taskInput.value.trim();
            
            if (taskValue === '') {
                return; // Silently do nothing if the input is empty
            }

            // Create list container element
            const li = document.createElement('li');

            // Create clickable text span
            const taskSpan = document.createElement('span');
            taskSpan.className = 'task-text';
            taskSpan.innerText = taskValue;
            taskSpan.addEventListener('click', () => {
                li.classList.toggle('completed');
            });

            // Create functional delete button
            const deleteBtn = document.createElement('button');
            deleteBtn.className = 'delete-btn';
            deleteBtn.innerText = 'Delete';
            deleteBtn.addEventListener('click', () => {
                li.style.opacity = '0';
                li.style.transform = 'scale(0.8)';
                setTimeout(() => li.remove(), 300);
            });

            // Append elements into structure
            li.appendChild(taskSpan);
            li.appendChild(deleteBtn);
            taskList.appendChild(li);

            // Clean the input box
            taskInput.value = '';
        }
    </script>
</body>
</html>
