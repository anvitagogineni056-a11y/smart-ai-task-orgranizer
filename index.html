<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Core Focus</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI',sans-serif;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(180deg,#d8f3dc,#f1faee);
}

.container{
    width:90%;
    max-width:500px;
    background:rgba(255,255,255,0.95);
    padding:30px;
    border-radius:25px;
    box-shadow:0 10px 25px rgba(46,125,50,0.15);
}

h1{
    text-align:center;
    color:#2d6a4f;
    margin-bottom:8px;
    font-size:2.3rem;
}

.subtitle{
    text-align:center;
    color:#588157;
    margin-bottom:25px;
}

.input-box{
    width:100%;
    padding:14px;
    border:none;
    border-bottom:2px solid #95d5b2;
    background:transparent;
    outline:none;
    font-size:1rem;
    color:#2d6a4f;
}

.input-box::placeholder{
    color:#7da37d;
}

ul{
    list-style:none;
    margin-top:20px;
}

li{
    background:#f6fff8;
    margin:10px 0;
    padding:14px;
    border-left:5px solid #52b788;
    border-radius:12px;
    cursor:pointer;
    transition:.3s;
    color:#2d6a4f;
}

li:hover{
    transform:translateX(4px);
}

.completed{
    text-decoration:line-through;
    opacity:0.55;
}

.footer{
    text-align:center;
    margin-top:20px;
    color:#74a57f;
    font-size:0.9rem;
}
</style>
</head>
<body>

<div class="container">
    <h1>🌿 Core Focus</h1>
    <p class="subtitle">Grow your goals naturally</p>

    <input
        type="text"
        id="taskInput"
        class="input-box"
        placeholder="Type a task and press Enter..."
    >

    <ul id="taskList"></ul>

    <div class="footer">🌱 One step closer every day</div>
</div>

<script>
const input = document.getElementById("taskInput");
const list = document.getElementById("taskList");

input.addEventListener("keypress", function(e) {
    if (e.key === "Enter" && input.value.trim() !== "") {

        const li = document.createElement("li");
        li.textContent = "🍃 " + input.value;

        li.addEventListener("click", () => {
            li.classList.toggle("completed");
        });

        li.addEventListener("dblclick", () => {
            li.remove();
        });

        list.appendChild(li);
        input.value = "";
    }
});
</script>

</body>
</html>
