<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Focus</title>
    <style>
        :root {
            --bg: #fafbfc;
            --text: #1e2924;
            --muted: #8fa096;
            --green: #2d5a3f;
            --line: #e6ebe8;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            max-width: 400px;
            margin: 0 auto;
            padding: 16vh 24px 0 24px;
            overflow-x: hidden;
        }

        header {
            margin-bottom: 48px;
        }

        h1 {
            font-size: 22px;
            font-weight: 400;
            letter-spacing: -0.3px;
            color: var(--green);
            margin: 0 0 4px 0;
        }

        .subtitle {
            font-size: 12px;
            color: var(--muted);
            margin: 0;
        }

        input[type="text"] {
            width: 100%;
            box-sizing: border-box;
            border: none;
            border-bottom: 1px solid var(--line);
            background: transparent;
            padding: 12px 0;
            font-size: 15px;
            color: var(--text);
            outline: none;
            margin-bottom: 16px;
            transition: border-color 0.3s;
        }

        input[type="text"]:focus {
            border-bottom-color: var(--green);
        }

        input[type="text"]::placeholder {
            color: var(--muted);
            opacity: 0.6;
        }

        .todo-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .todo-item-wrapper {
            position: relative;
            overflow: hidden;
            background: transparent;
            user-select: none;
        }

        .todo-item {
            display: flex;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid var(--line);
            background-color: var(--bg);
            position: relative;
            z-index: 2;
            cursor: pointer;
            transform: translate3d(0, 0, 0);
            transition: transform 0.1s ease-out;
        }

        .todo-text {
            font-size: 15px;
            word-break: break-word;
            position: relative;
            transition: color 0.3s;
        }

        .todo-text::after {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            width: 0;
            height: 1px;
            background-color: var(--muted);
            transition: width 0.25s ease;
        }

        .todo-item.completed .todo-text {
            color: var(--muted);
        }

        .todo-item.completed .todo-text::after {
            width: 100%;
        }

        .delete-bg {
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            left: 0;
            background-color: #f7eceb;
            color: #b35959;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 20px;
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
            z-index: 1;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .empty-state {
            color: var(--muted);
            font-size: 13px;
            margin-top: 32px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

<header>
    <h1>Core Focus</h1>
    <p class="subtitle">Enter to add. Tap to complete. Swipe left/Right-click to delete.</p>
</header>

<input type="text" id="todo-input" placeholder="Write down a focus..." autocomplete="off">

<ul class="todo-list" id="todo-list"></ul>
<div id="empty-state" class="empty-state">All tasks cleared.</div>

<script>
    const todoInput = document.getElementById('todo-input');
    const todoList = document.getElementById('todo-list');
    const emptyState = document.getElementById('empty-state');

    let todos = JSON.parse(localStorage.getItem('core_focus_ultra_todos')) || [];

    function saveTodos() {
        localStorage.setItem('core_focus_ultra_todos', JSON.stringify(todos));
    }

    function updateVisibility() {
        emptyState.style.display = todos.length === 0 ? 'block' : 'none';
    }

    function renderTodos() {
        todoList.innerHTML = '';
        todos.forEach((todo, index) => {
            const wrapper = document.createElement('li');
            wrapper.className = 'todo-item-wrapper';

            wrapper.innerHTML = `
                <div class="delete-bg">Delete</div>
                <div class="todo-item ${todo.completed ? 'completed' : ''}" data-index="${index}">
                    <span class="todo-text">${escapeHtml(todo.text)}</span>
                </div>
            `;

            const item = wrapper.querySelector('.todo-item');
            const deleteBg = wrapper.querySelector('.delete-bg');

            // --- Desktop Right-Click to Delete ---
            item.addEventListener('contextmenu', (e) => {
                e.preventDefault();
                deleteTodo(index);
            });

            // --- Click to Toggle Complete ---
            let isDragging = false;
            item.addEventListener('click', () => {
                if (!isDragging) toggleTodo(index);
            });

            // --- Mobile Swipe Mobile Interaction ---
            let startX = 0;
            let currentX = 0;

            item.addEventListener('touchstart', (e) => {
                startX = e.touches[0].clientX;
                item.style.transition = 'none';
                isDragging = false;
            }, { passive: true });

            item.addEventListener('touchmove', (e) => {
                currentX = e.touches[0].clientX;
                let diffX = currentX - startX;

                // Restrict swipe to left direction only
                if (diffX < 0) {
                    isDragging = true;
                    deleteBg.style.opacity = '1';
                    item.style.transform = translate3d(${diffX}px, 0, 0);
                    
                    // Highlight delete action if swiped past threshold
                    if (diffX < -120) {
                        deleteBg.style.backgroundColor = '#f2dbda';
                    } else {
                        deleteBg.style.backgroundColor = '#f7eceb';
                    }
                }
            }, { passive: true });

            item.addEventListener('touchend', (e) => {
                item.style.transition = 'transform 0.2s ease-out';
                let diffX = currentX - startX;

                if (diffX < -140) {
                    // Confirmed swipe to delete
                    item.style.transform = 'translate3d(-100%, 0, 0)';
                    setTimeout(() => deleteTodo(index), 150);
                } else {
                    // Snap back
                    item.style.transform = 'translate3d(0, 0, 0)';
                    setTimeout(() => { deleteBg.style.opacity = '0'; }, 200);
                }
                startX = 0;
                currentX = 0;
            });

            todoList.appendChild(wrapper);
        });
        updateVisibility();
    }

    function addTodo() {
        const text = todoInput.value.trim();
        if (text) {
            todos.push({ text, completed: false });
            todoInput.value = '';
            saveTodos();
            renderTodos();
        }
    }

    function toggleTodo(index) {
        todos[index].completed = !todos[index].completed;
        saveTodos();
        renderTodos();
    }

    function deleteTodo(index) {
        todos.splice(index, 1);
        saveTodos();
        renderTodos();
    }

    function escapeHtml(text) {
        return text
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#039;");
    }

    todoInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') addTodo();
    });

    renderTodos();
</script>

</body>
</html>
