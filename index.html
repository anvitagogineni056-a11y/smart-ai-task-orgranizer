<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Focus</title>
    <style>
        body {
            background-color: #f4f7f5;
            color: #2e4a3f;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            width: 100%;
            max-width: 360px;
            padding: 20px;
        }
        h1 {
            font-size: 0.9rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 5px;
            color: #6b8e7d;
            text-align: center;
        }
        .score-tracker {
            font-size: 0.8rem;
            color: #8fa89b;
            text-align: center;
            letter-spacing: 1px;
            margin-bottom: 25px;
            height: 15px;
        }
        .focus-section {
            margin-bottom: 45px;
        }
        .focus-input {
            width: 100%;
            border: none;
            border-bottom: 1px dashed #cedbd0;
            background: transparent;
            padding: 8px 0;
            font-size: 1.35rem;
            color: #2e4a3f;
            text-align: center;
            outline: none;
        }
        .focus-input::placeholder {
            color: #cbd5c0;
            font-style: italic;
        }
        .todo-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .todo-item {
            display: flex;
            align-items: center;
            margin-bottom: 16px;
        }
        .todo-item input[type="checkbox"] {
            position: absolute;
            opacity: 0;
            height: 0;
            width: 0;
        }
        .checkmark {
            height: 15px;
            width: 15px;
            border: 1px solid #a3b899;
            border-radius: 4px;
            margin-right: 14px;
            display: inline-block;
            position: relative;
            cursor: pointer;
        }
        .todo-item input[type="checkbox"]:checked ~ .checkmark {
            background-color: #a3b899;
        }
        .todo-item input[type="checkbox"]:checked ~ .checkmark:after {
            content: "";
            position: absolute;
            left: 5px;
            top: 2px;
            width: 3px;
            height: 7px;
            border: solid #f4f7f5;
            border-width: 0.12rem 0.12rem 0 0;
            transform: scaleX(-1) rotate(135deg);
            transform-origin: left top;
        }
        .todo-text {
            font-size: 1rem;
            flex-grow: 1;
            border: none;
            background: transparent;
            color: #2e4a3f;
            outline: none;
        }
        .todo-text::placeholder {
            color: #cbd5c0;
        }
        .completed .todo-text {
            color: #a0b5a7;
            text-decoration: line-through;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="focus-section">
            <h1>Core Focus</h1>
            <div class="score-tracker" id="scoreTracker"></div>
            <input type="text" class="focus-input" placeholder="What is your main intention?" maxlength="60">
        </div>
        <ul class="todo-list" id="todoList"></ul>
    </div>

    <script>
        const todoList = document.getElementById('todoList');
        const scoreTracker = document.getElementById('scoreTracker');
        const maxItems = 6;

        function updateScore() {
            const rows = todoList.querySelectorAll('.todo-item');
            let total = 0, completed = 0;
            rows.forEach(row => {
                const text = row.querySelector('.todo-text').value.trim();
                const checked = row.querySelector('input[type="checkbox"]').checked;
                if (text !== '') {
                    total++;
                    if (checked) completed++;
                }
            });
            scoreTracker.textContent = total > 0 ? ${completed} / ${total} completed : '';
        }

        function createTodoRow(text = '', isChecked = false) {
            const li = document.createElement('li');
            li.className = todo-item ${isChecked ? 'completed' : ''};
            li.innerHTML = `
                <label style="display: flex; align-items: center; width: 100%;">
                    <input type="checkbox" ${isChecked ? 'checked' : ''}>
                    <span class="checkmark"></span>
                    <input type="text" class="todo-text" value="${text}" placeholder="Add a task...">
                </label>
            `;

            const checkbox = li.querySelector('input[type="checkbox"]');
            const textInput = li.querySelector('.todo-text');

            checkbox.addEventListener('change', () => {
                li.classList.toggle('completed', checkbox.checked);
                updateScore();
                saveData();
            });

            textInput.addEventListener('input', () => {
                manageRows();
                updateScore();
                saveData();
            });

            textInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    const next = li.nextElementSibling;
                    if (next) next.querySelector('.todo-text').focus();
                }
                if (e.key === 'Backspace' && textInput.value === '') {
                    const prev = li.previousElementSibling;
                    if (todoList.querySelectorAll('.todo-item').length > 1) {
                        e.preventDefault();
                        li.remove();
                        if (prev) {
                            const input = prev.querySelector('.todo-text');
                            input.focus();
                            const val = input.value;
                            input.value = '';
                            input.value = val;
                        }
                        manageRows();
                        updateScore();
                        saveData();
                    }
                }
            });
            return li;
        }

        function manageRows() {
            const rows = todoList.querySelectorAll('.todo-item');
            if (rows.length === 0) {
                todoList.appendChild(createTodoRow());
                return;
            }
            const lastInput = rows[rows.length - 1].querySelector('.todo-text');
            if (lastInput.value.trim() !== '' && rows.length < maxItems) {
                todoList.appendChild(createTodoRow());
            }
        }

        function saveData() {
            const focusVal = document.querySelector('.focus-input').value;
            const todos = [];
            todoList.querySelectorAll('.todo-item').forEach(row => {
                const text = row.querySelector('.todo-text').value;
                const checked = row.querySelector('input[type="checkbox"]').checked;
                if (text.trim() !== '' || row === todoList.lastElementChild) {
                    todos.push({ text, checked });
                }
            });
            localStorage.setItem('minimalNatureFocus', JSON.stringify({ focus: focusVal, todos }));
        }

        function loadData() {
            const saved = localStorage.getItem('minimalNatureFocus');
            if (saved) {
                const data = JSON.parse(saved);
                document.querySelector('.focus-input').value = data.focus || '';
                if (data.todos) {
                    data.todos.forEach(todo => todoList.appendChild(createTodoRow(todo.text, todo.checked)));
                }
            }
            manageRows();
            updateScore();
        }

        document.querySelector('.focus-input').addEventListener('input', saveData);
        loadData();
    </script>
</body>
</html>
